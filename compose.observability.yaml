services:

  jaeger:
    image: ${JAEGERTRACING_IMAGE}
    container_name: jaeger
    command:
      - "--config=file:/etc/jaeger/config.yml"
    deploy:
      resources:
        limits:
          memory: 1200M
    restart: unless-stopped
    ports:
      - "${JAEGER_UI_PORT}"
      - "${JAEGER_GRPC_PORT}"
    environment:
      - JAEGER_HOST
      - JAEGER_GRPC_PORT
      - PROMETHEUS_ADDR
      - OTEL_COLLECTOR_HOST
      - OTEL_COLLECTOR_PORT_HTTP
      - MEMORY_MAX_TRACES=25000
    volumes:
      - ./src/jaeger/config.yml:/etc/jaeger/config.yml
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  grafana:
    image: ${GRAFANA_IMAGE}
    container_name: grafana
    deploy:
      resources:
        limits:
          memory: 300M
    restart: unless-stopped
    environment:
      - GF_INSTALL_PLUGINS=grafana-opensearch-datasource
      - GF_SERVER_ROOT_URL=http://10.1.39.68:8080/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - ./src/grafana/grafana.ini:/etc/grafana/grafana.ini
      - ./src/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "${GRAFANA_PORT}"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  prometheus:
    image: ${PROMETHEUS_IMAGE}
    container_name: prometheus
    command:
      - --web.console.templates=/etc/prometheus/consoles
      - --web.console.libraries=/etc/prometheus/console_libraries
      - --storage.tsdb.retention.time=7d
      - --config.file=/etc/prometheus/prometheus-config.yaml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
      - --web.route-prefix=/
      - --web.enable-otlp-receiver
      - --enable-feature=exemplar-storage
    volumes:
      - ./src/prometheus/prometheus-config.yaml:/etc/prometheus/prometheus-config.yaml
    deploy:
      resources:
        limits:
          memory: 400M
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT}:${PROMETHEUS_PORT}"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  opensearch:
    image: ${IMAGE_NAME}:${DEMO_VERSION}-opensearch
    container_name: opensearch
    build:
      context: ./
      dockerfile: ${OPENSEARCH_DOCKERFILE}
      cache_from:
        - ${IMAGE_NAME}:${IMAGE_VERSION}-opensearch

    deploy:
      resources:
        limits:
          memory: 2G

    restart: unless-stopped

    environment:
      - cluster.name=demo-cluster
      - node.name=demo-node
      - bootstrap.memory_lock=true
      - discovery.type=single-node
      - OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - DISABLE_SECURITY_PLUGIN=true
      - _JAVA_OPTIONS

    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536

    ports:
      - "9200:9200"

    healthcheck:
      test: curl -s http://localhost:9200/_cluster/health | grep -E '"status":"(green|yellow)"'
      start_period: 10s
      interval: 5s
      timeout: 10s
      retries: 10

    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  opamp-server:
    image: ${IMAGE_NAME}:${DEMO_VERSION}-opamp-server
    container_name: opamp-server

    build:
      context: ./
      dockerfile: ${OPAMP_SERVER_DOCKERFILE}
      args:
        OPAMP_GO_REF: ${OPAMP_GO_REF}
      cache_from:
        - ${IMAGE_NAME}:${IMAGE_VERSION}-opamp-server

    deploy:
      resources:
        limits:
          memory: 128M

    restart: unless-stopped

    ports:
      - "4321:4321"

    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:4321/"
        ]
      start_period: 10s
      interval: 5s
      timeout: 5s
      retries: 10

    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  frontend-proxy:
    depends_on:
      jaeger:
        condition: service_started
      grafana:
        condition: service_started
      opamp-server:
        condition: service_healthy

  otel-collector:
    command:
      - "--config=/etc/otelcol-config.yml"
      - "--config=/etc/otelcol-config-full.yml"
      - "--config=/etc/otelcol-config-observability.yml"
      - "--config=/etc/otelcol-config-extras.yml"
      - "--feature-gates=service.profilesSupport"

    deploy:
      resources:
        limits:
          memory: 500M

    volumes:
      - ${OTEL_COLLECTOR_CONFIG}:/etc/otelcol-config.yml
      - ${OTEL_COLLECTOR_CONFIG_FULL}:/etc/otelcol-config-full.yml
      - ${OTEL_COLLECTOR_CONFIG_OBSERVABILITY}:/etc/otelcol-config-observability.yml
      - ${OTEL_COLLECTOR_CONFIG_EXTRAS}:/etc/otelcol-config-extras.yml

    environment:
      - KAFKA_ADDR

    depends_on:
      jaeger:
        condition: service_started
      opensearch:
        condition: service_healthy
      opamp-server:
        condition: service_healthy

