receivers:

  otlp:
    protocols:
      grpc:
        endpoint: ${env:OTEL_COLLECTOR_HOST}:${env:OTEL_COLLECTOR_PORT_GRPC}
      http:
        endpoint: ${env:OTEL_COLLECTOR_HOST}:${env:OTEL_COLLECTOR_PORT_HTTP}
        cors:
          allowed_origins:
            - "http://*"
            - "https://*"

  http_check/frontend-proxy:
    targets:
      - endpoint: http://${env:FRONTEND_PROXY_ADDR}

  nginx:
    endpoint: http://${env:IMAGE_PROVIDER_HOST}:${env:IMAGE_PROVIDER_PORT}/status
    collection_interval: 10s

  docker_stats:
    endpoint: unix:///var/run/docker.sock
    api_version: "1.44"

  redis:
    endpoint: valkey-cart:6379
    username: valkey
    collection_interval: 10s

  postgresql:
    endpoint: ${env:POSTGRES_HOST}:${env:POSTGRES_PORT}
    username: monitoring_user
    password: ${env:POSTGRES_MONITORING_PASSWORD}
    tls:
      insecure: true
    metrics:
      postgresql.blks_hit:
        enabled: true
      postgresql.blks_read:
        enabled: true
      postgresql.tup_fetched:
        enabled: true
      postgresql.tup_returned:
        enabled: true
      postgresql.tup_inserted:
        enabled: true
      postgresql.tup_updated:
        enabled: true
      postgresql.tup_deleted:
        enabled: true
      postgresql.deadlocks:
        enabled: true

  prometheus/ad:
    config:
      scrape_configs:
        - job_name: ad
          scrape_interval: 10s
          static_configs:
            - targets:
                - ad:${env:AD_PROMETHEUS_PORT}

  host_metrics:
    root_path: /hostfs
    scrapers:

      cpu:
        metrics:
          system.cpu.utilization:
            enabled: true
          system.cpu.logical.count:
            enabled: true

      disk:

      load:

      filesystem:
        exclude_mount_points:
          match_type: regexp
          mount_points:
            - /dev/*
            - /proc/*
            - /sys/*
            - /run/k3s/containerd/*
            - /var/lib/docker/*
            - /var/lib/kubelet/*
            - /snap/*
        exclude_fs_types:
          match_type: strict
          fs_types:
            - autofs
            - binfmt_misc
            - bpf
            - cgroup2
            - configfs
            - debugfs
            - devpts
            - devtmpfs
            - fusectl
            - hugetlbfs
            - iso9660
            - mqueue
            - nsfs
            - overlay
            - proc
            - procfs
            - pstore
            - rpc_pipefs
            - securityfs
            - selinuxfs
            - squashfs
            - sysfs
            - tracefs

      memory:
        metrics:
          system.memory.utilization:
            enabled: true
          system.memory.limit:
            enabled: true

      network:

      paging:
        metrics:
          system.paging.usage:
            enabled: true

      processes:

      process:
        mute_process_exe_error: true
        mute_process_io_error: true
        mute_process_user_error: true

      system:
        metrics:
          system.uptime:
            enabled: true

processors:

  memory_limiter:
    check_interval: 5s
    limit_percentage: 85
    spike_limit_percentage: 25

  batch:
    send_batch_size: 1024
    timeout: 5s

  resourcedetection:
    detectors:
      - env
      - docker
      - system
    system:
      hostname_sources:
        - os
      resource_attributes:
        host.name:
          enabled: true
        host.arch:
          enabled: true
        os.description:
          enabled: true
        os.type:
          enabled: true

  resource/azure:
    attributes:
      - key: deployment.environment.name
        value: azure
        action: upsert

      - key: cloud.provider
        value: azure
        action: upsert

      - key: host.ip
        value: 10.1.39.68
        action: upsert

      - key: monitoring.stack
        value: opentelemetry-demo
        action: upsert

  filter/sanitize_profiles:
    error_mode: ignore
    profiles:
      profile:
        - 'IsMatch(resource.attributes["service.name"], "containerd-shim-.*")'

  transform/sanitize_logs:
    error_mode: ignore
    log_statements:
      - context: scope
        statements:
          - set(attributes["otelcol_signal"], attributes["otelcol.signal"]) where attributes["otelcol.signal"] != nil and not IsMap(attributes["otelcol.signal"])
          - delete_key(attributes, "otelcol.signal") where attributes["otelcol_signal"] != nil

  gen_ai_normalizer:
    sources:
      - name: openllmetry

  transform/sanitize_spans:
    error_mode: ignore
    trace_statements:
      - context: span
        statements:
          - set_semconv_span_name("1.37.0", "original_span_name")

exporters:

  debug:

connectors:

  span_metrics:

service:

  pipelines:

    traces:
      receivers:
        - otlp
      processors:
        - resource/azure
        - resourcedetection
        - memory_limiter
        - batch
        - transform/sanitize_spans
        - gen_ai_normalizer
      exporters:
        - debug
        - span_metrics

    metrics:
      receivers:
        - docker_stats
        - http_check/frontend-proxy
        - host_metrics
        - nginx
        - otlp
        - redis
        - postgresql
        - prometheus/ad
        - span_metrics
      processors:
        - resource/azure
        - resourcedetection
        - memory_limiter
        - batch
      exporters:
        - debug

    logs:
      receivers:
        - otlp
      processors:
        - resource/azure
        - resourcedetection
        - memory_limiter
        - batch
        - transform/sanitize_logs
      exporters:
        - debug

    profiles:
      receivers:
        - otlp
      processors:
        - resource/azure
        - resourcedetection
        - filter/sanitize_profiles
        - memory_limiter
      exporters:
        - debug

  telemetry:
    metrics:
      readers:
        - periodic:
            exporter:
              otlp:
                protocol: http/protobuf
                endpoint: http://${env:OTEL_COLLECTOR_HOST}:${env:OTEL_COLLECTOR_PORT_HTTP}

    logs:
      processors:
        - batch:
            exporter:
              otlp:
                protocol: http/protobuf
                endpoint: http://${env:OTEL_COLLECTOR_HOST}:${env:OTEL_COLLECTOR_PORT_HTTP}
