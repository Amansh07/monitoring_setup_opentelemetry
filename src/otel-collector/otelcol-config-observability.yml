exporters:

  otlp_grpc/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true
    sending_queue:
      enabled: true
    retry_on_failure:
      enabled: true

  otlp_http/prometheus:
    endpoint: http://prometheus:9090/api/v1/otlp
    tls:
      insecure: true
    sending_queue:
      enabled: true
    retry_on_failure:
      enabled: true

  opensearch:
    logs_index: otel-logs
    logs_index_time_format: "yyyy-MM-dd"

    http:
      endpoint: http://opensearch:9200
      tls:
        insecure: true

    sending_queue:
      enabled: true

    retry_on_failure:
      enabled: true

  otlp_grpc/firepit:
    endpoint: firepit:4317

    tls:
      insecure: true

    sending_queue:
      enabled: true

    retry_on_failure:
      enabled: true

extensions:

  opamp:
    server:
      ws:
        endpoint: ws://opamp-server:4320/v1/opamp

    instance_uid: 00000000-0000-7000-8000-000000000001

    capabilities:
      reports_effective_config: true
      reports_health: true
      reports_available_components: true

    agent_description:
      include_resource_attributes: true

      non_identifying_attributes:
        deployment.environment.name: azure
        demo.collector.role: gateway

service:

  extensions:
    - opamp

  pipelines:

    traces:
      exporters:
        - debug
        - otlp_grpc/jaeger
        - span_metrics

    metrics:
      exporters:
        - debug
        - otlp_http/prometheus

    logs:
      exporters:
        - debug
        - opensearch

    profiles:
      exporters:
        - debug
        - otlp_grpc/firepit

