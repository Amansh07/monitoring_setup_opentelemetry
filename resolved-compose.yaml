name: opentelemetry-demo
services:
  accounting:
    build:
      context: /home/gaiadmin/opentelemetry-demo
      dockerfile: ./src/accounting/Dockerfile
    container_name: accounting
    depends_on:
      kafka:
        condition: service_healthy
        required: true
      otel-collector:
        condition: service_started
        required: true
    deploy:
      resources:
        limits:
          memory: "167772160"
    environment:
      DB_CONNECTION_STRING: Host=astronomy-db;Username=astronomy_user;Password=astronomy_password;Database=astronomy_db
      KAFKA_ADDR: kafka:9092
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE: cumulative
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=opentelemetry-demo,service.version=2.2.0,service.criticality=low
      OTEL_SERVICE_NAME: accounting
    image: ghcr.io/open-telemetry/demo:latest-accounting
    networks:
      default: null
    restart: unless-stopped
  ad:
    build:
      context: /home/gaiadmin/opentelemetry-demo
      dockerfile: ./src/ad/Dockerfile
      args:
        OTEL_JAVA_AGENT_VERSION: 2.28.1
      cache_from:
        - ghcr.io/open-telemetry/demo:2.2.0-ad
    container_name: ad
    depends_on:
      flagd:
        condition: service_started
        required: true
      otel-collector:
        condition: service_started
        required: true
    deploy:
      resources:
        limits:
          memory: "314572800"
    environment:
      _JAVA_OPTIONS: null
      AD_PORT: "9555"
      AD_PROMETHEUS_PORT: "9465"
      FLAGD_HOST: flagd
      FLAGD_PORT: "8013"
      OTEL_EXPERIMENTAL_SDK_TELEMETRY_VERSION: latest
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE: cumulative
      OTEL_LOGS_EXPORTER: otlp
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=opentelemetry-demo,service.version=2.2.0,service.criticality=medium
      OTEL_SERVICE_NAME: ad
    healthcheck:
      test:
        - CMD-SHELL
        - bash -c 'echo > /dev/tcp/localhost/9555'
      timeout: 5s
      interval: 5s
      retries: 20
      start_period: 20s
    image: ghcr.io/open-telemetry/demo:latest-ad
    logging:
      driver: json-file
      options:
        max-file: "2"
        max-size: 5m
    networks:
      default: null
    ports:
      - mode: ingress
        target: 9555
        protocol: tcp
      - mode: ingress
        target: 9465
        protocol: tcp
    restart: unless-stopped
  agent:
    build:
      context: /home/gaiadmin/opentelemetry-demo
      dockerfile: src/agent/Dockerfile
    container_name: agent
    depends_on:
      mcp:
        condition: service_started
        required: true
      otel-collector:
        condition: service_started
        required: true
      product-catalog:
        condition: service_started
        required: true
    deploy:
      resources:
        limits:
          memory: "524288000"
    environment:
      AGENT_ENDPOINT: agent
      AGENT_PORT: "8010"
      API_KEY: ""
      APPLICATION_ENDPOINT: frontend:8080
      GRAPH_RECURSION_LIMIT: "25"
      LLM_BASE_URL: https://local-llm.com
      LLM_MODEL: azure/gpt-5.5
      MCP_ENABLED: "False"
      MCP_ENDPOINT: mcp
      MCP_PORT: "8011"
      OPENAI_API_KEY: ""
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=opentelemetry-demo,service.version=2.2.0,service.criticality=low
      OTEL_SERVICE_NAME: agent
      USE_VCR: "True"
    image: ghcr.io/open-telemetry/demo:latest-agent
    networks:
      default: null
    ports:
      - mode: ingress
        target: 8010
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: bind
        source: /home/gaiadmin/opentelemetry-demo/src/agent/fixtures
        target: /app/fixtures
        bind: {}
  astronomy-db:
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
    container_name: astronomy-db
    deploy:
      resources:
        limits:
          memory: "83886080"
    environment:
      POSTGRES_PASSWORD: changeit
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready
      timeout: 5s
      interval: 5s
      retries: 10
      start_period: 10s
    image: postgres:17.8
    logging:
      driver: json-file
      options:
        max-file: "2"
        max-size: 5m
    networks:
      default: null
    ports:
      - mode: ingress
        target: 5432
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: bind
        source: /home/gaiadmin/opentelemetry-demo/src/postgresql/init.sql
        target: /docker-entrypoint-initdb.d/init.sql
        bind: {}
  cart:
    build:
      context: /home/gaiadmin/opentelemetry-demo
      dockerfile: ./src/cart/src/Dockerfile
      cache_from:
        - ghcr.io/open-telemetry/demo:2.2.0-cart
    container_name: cart
    depends_on:
      flagd:
        condition: service_started
        required: true
      otel-collector:
        condition: service_started
        required: true
      valkey-cart:
        condition: service_healthy
        required: true
    deploy:
      resources:
        limits:
          memory: "167772160"
    environment:
      ASPNETCORE_URLS: http://*:7070
      CART_PORT: "7070"
      FLAGD_HOST: flagd
      FLAGD_PORT: "8013"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE: cumulative
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=opentelemetry-demo,service.version=2.2.0,service.criticality=high
      OTEL_SERVICE_NAME: cart
      VALKEY_ADDR: valkey-cart:6379
    image: ghcr.io/open-telemetry/demo:latest-cart
    logging:
      driver: json-file
      options:
        max-file: "2"
        max-size: 5m
    networks:
      default: null
    ports:
      - mode: ingress
        target: 7070
        protocol: tcp
    restart: unless-stopped
  chatbot:
    build:
      context: /home/gaiadmin/opentelemetry-demo
      dockerfile: src/chatbot/Dockerfile
    container_name: chatbot
    depends_on:
      agent:
        condition: service_started
        required: true
    deploy:
      resources:
        limits:
          memory: "524288000"
    environment:
      AGENT_ENDPOINT: agent
      AGENT_PORT: "8010"
      CHATBOT_PORT: "7860"
      CHATBOT_ROOT_PATH: /chatbot
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=opentelemetry-demo,service.version=2.2.0,service.criticality=low
      OTEL_SERVICE_NAME: chatbot
    image: ghcr.io/open-telemetry/demo:latest-chatbot
    networks:
      default: null
    ports:
      - mode: ingress
        target: 7860
        protocol: tcp
    restart: unless-stopped
  checkout:
    build:
      context: /home/gaiadmin/opentelemetry-demo
      dockerfile: ./src/checkout/Dockerfile
      cache_from:
        - ghcr.io/open-telemetry/demo:2.2.0-checkout
    container_name: checkout
    depends_on:
      cart:
        condition: service_started
        required: true
      currency:
        condition: service_healthy
        required: true
      email:
        condition: service_healthy
        required: true
      flagd:
        condition: service_started
        required: true
      kafka:
        condition: service_healthy
        required: true
      otel-collector:
        condition: service_started
        required: true
      payment:
        condition: service_healthy
        required: true
      product-catalog:
        condition: service_started
        required: true
      shipping:
        condition: service_started
        required: true
    deploy:
      resources:
        limits:
          memory: "20971520"
    environment:
      CART_ADDR: cart:7070
      CHECKOUT_PORT: "5050"
      CURRENCY_ADDR: currency:7001
      EMAIL_ADDR: http://email:6060
      FLAGD_HOST: flagd
      FLAGD_PORT: "8013"
      GOMEMLIMIT: 16MiB
      KAFKA_ADDR: kafka:9092
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE: cumulative
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=opentelemetry-demo,service.version=2.2.0,service.criticality=critical
      OTEL_SERVICE_NAME: checkout
      PAYMENT_ADDR: payment:50051
      PRODUCT_CATALOG_ADDR: product-catalog:3550
      SHIPPING_ADDR: http://shipping:50050
    healthcheck:
      test:
        - CMD
        - /bin/grpc_health_probe
        - -addr=:5050
      timeout: 5s
      interval: 5s
      retries: 20
      start_period: 10s
    image: ghcr.io/open-telemetry/demo:latest-checkout
    logging:
      driver: json-file
      options:
        max-file: "2"
        max-size: 5m
    networks:
      default: null
    ports:
      - mode: ingress
        target: 5050
        protocol: tcp
    read_only: true
    restart: unless-stopped
    tmpfs:
      - /tmp
  currency:
    build:
      context: /home/gaiadmin/opentelemetry-demo
      dockerfile: ./src/currency/Dockerfile
      args:
        OPENTELEMETRY_CPP_VERSION: 1.27.0
      cache_from:
        - ghcr.io/open-telemetry/demo:2.2.0-currency
    container_name: currency
    depends_on:
      otel-collector:
        condition: service_started
        required: true
    deploy:
      resources:
        limits:
          memory: "20971520"
    environment:
      CURRENCY_PORT: "7001"
      IPV6_ENABLED: "false"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE: cumulative
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=opentelemetry-demo,service.version=2.2.0,service.criticality=high
      OTEL_SERVICE_NAME: currency
      VERSION: 2.2.0
    healthcheck:
      test:
        - CMD-SHELL
        - nc -z localhost 7001
      timeout: 5s
      interval: 5s
      retries: 20
      start_period: 10s
    image: ghcr.io/open-telemetry/demo:latest-currency
    logging:
      driver: json-file
      options:
        max-file: "2"
        max-size: 5m
    networks:
      default: null
    ports:
      - mode: ingress
        target: 7001
        protocol: tcp
    restart: unless-stopped
  email:
    build:
      context: /home/gaiadmin/opentelemetry-demo
      dockerfile: ./src/email/Dockerfile
      cache_from:
        - ghcr.io/open-telemetry/demo:2.2.0-email
    container_name: email
    depends_on:
      otel-collector:
        condition: service_started
        required: true
    deploy:
      resources:
        limits:
          memory: "104857600"
    environment:
      APP_ENV: production
      EMAIL_PORT: "6060"
      FLAGD_HOST: flagd
      FLAGD_PORT: "8013"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE: cumulative
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=opentelemetry-demo,service.version=2.2.0,service.criticality=medium
      OTEL_SERVICE_NAME: email
    healthcheck:
      test:
        - CMD
        - ruby
        - -e
        - require 'socket'; TCPSocket.new('localhost', 6060).close
      timeout: 5s
      interval: 5s
      retries: 20
      start_period: 10s
    image: ghcr.io/open-telemetry/demo:latest-email
    logging:
      driver: json-file
      options:
        max-file: "2"
        max-size: 5m
    networks:
      default: null
    ports:
      - mode: ingress
        target: 6060
        protocol: tcp
    restart: unless-stopped
  flagd:
    command:
      - start
      - --uri
      - file:./etc/flagd/demo.flagd.json
    container_name: flagd
    deploy:
      resources:
        limits:
          memory: "78643200"
    environment:
      FLAGD_METRICS_EXPORTER: otel
      FLAGD_OTEL_COLLECTOR_URI: otel-collector:4317
      GOMEMLIMIT: 60MiB
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=opentelemetry-demo,service.version=2.2.0,service.criticality=low
      OTEL_SERVICE_NAME: flagd
    image: ghcr.io/open-feature/flagd:v0.14.2
    logging:
      driver: json-file
      options:
        max-file: "2"
        max-size: 5m
    networks:
      default: null
    ports:
      - mode: ingress
        target: 8013
        protocol: tcp
      - mode: ingress
        target: 8016
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: bind
        source: /home/gaiadmin/opentelemetry-demo/src/flagd
        target: /etc/flagd
        bind: {}
  flagd-ui:
    build:
      context: /home/gaiadmin/opentelemetry-demo
      dockerfile: ./src/flagd-ui/Dockerfile
      cache_from:
        - ghcr.io/open-telemetry/demo:2.2.0-flagd-ui
    container_name: flagd-ui
    depends_on:
      flagd:
        condition: service_started
        required: true
      otel-collector:
        condition: service_started
        required: true
    deploy:
      resources:
        limits:
          memory: "209715200"
    environment:
      FLAGD_UI_PORT: "4000"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE: cumulative
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=opentelemetry-demo,service.version=2.2.0,service.criticality=low
      OTEL_SERVICE_NAME: flagd-ui
      PHX_HOST: localhost
      SECRET_KEY_BASE: yYrECL4qbNwleYInGJYvVnSkwJuSQJ4ijPTx5tirGUXrbznFIBFVJdPl5t6O9ASw
    healthcheck:
      test:
        - CMD
        - bash
        - -c
        - echo > /dev/tcp/localhost/4000
      timeout: 5s
      interval: 5s
      retries: 20
      start_period: 10s
    image: ghcr.io/open-telemetry/demo:latest-flagd-ui
    networks:
      default: null
    ports:
      - mode: ingress
        target: 4000
        protocol: tcp
    restart: always
    volumes:
      - type: bind
        source: /home/gaiadmin/opentelemetry-demo/src/flagd
        target: /app/data
        bind: {}
  fraud-detection:
    build:
      context: /home/gaiadmin/opentelemetry-demo
      dockerfile: ./src/fraud-detection/Dockerfile
    container_name: fraud-detection
    depends_on:
      kafka:
        condition: service_healthy
        required: true
      otel-collector:
        condition: service_started
        required: true
    deploy:
      resources:
        limits:
          memory: "314572800"
    environment:
      FLAGD_HOST: flagd
      FLAGD_PORT: "8013"
      KAFKA_ADDR: kafka:9092
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=opentelemetry-demo,service.version=2.2.0,service.criticality=low
      OTEL_SERVICE_NAME: fraud-detection
    image: ghcr.io/open-telemetry/demo:latest-fraud-detection
    networks:
      default: null
    restart: unless-stopped
  frontend:
    build:
      context: /home/gaiadmin/opentelemetry-demo
      dockerfile: ./src/frontend/Dockerfile
      cache_from:
        - ghcr.io/open-telemetry/demo:2.2.0-frontend
    container_name: frontend
    depends_on:
      ad:
        condition: service_healthy
        required: true
      cart:
        condition: service_started
        required: true
      checkout:
        condition: service_started
        required: true
      currency:
        condition: service_healthy
        required: true
      flagd:
        condition: service_started
        required: true
      image-provider:
        condition: service_healthy
        required: true
      otel-collector:
        condition: service_started
        required: true
      product-catalog:
        condition: service_started
        required: true
      quote:
        condition: service_healthy
        required: true
      recommendation:
        condition: service_healthy
        required: true
      shipping:
        condition: service_started
        required: true
    deploy:
      resources:
        limits:
          memory: "262144000"
    environment:
      AD_ADDR: ad:9555
      CART_ADDR: cart:7070
      CHECKOUT_ADDR: checkout:5050
      CURRENCY_ADDR: currency:7001
      ENV_PLATFORM: azure
      FLAGD_HOST: flagd
      FLAGD_PORT: "8013"
      FRONTEND_ADDR: frontend:8080
      OTEL_COLLECTOR_HOST: otel-collector
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE: cumulative
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=opentelemetry-demo,service.version=2.2.0,service.criticality=critical
      OTEL_SERVICE_NAME: frontend
      PORT: "8080"
      PRODUCT_CATALOG_ADDR: product-catalog:3550
      PUBLIC_OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://10.1.39.68:8080/otlp-http/v1/traces
      RECOMMENDATION_ADDR: recommendation:9001
      SHIPPING_ADDR: http://shipping:50050
      WEB_OTEL_SERVICE_NAME: frontend-web
    healthcheck:
      test:
        - CMD
        - /nodejs/bin/node
        - -e
        - require('net').connect(8080,require('os').hostname(),function(){process.exit(0)}).on('error',function(){process.exit(1)})
      timeout: 10s
      interval: 10s
      retries: 5
      start_period: 1m0s
    image: ghcr.io/open-telemetry/demo:latest-frontend
    logging:
      driver: json-file
      options:
        max-file: "2"
        max-size: 5m
    networks:
      default: null
    ports:
      - mode: ingress
        target: 8080
        protocol: tcp
    restart: unless-stopped
  frontend-proxy:
    build:
      context: /home/gaiadmin/opentelemetry-demo
      dockerfile: ./src/frontend-proxy/Dockerfile
      cache_from:
        - ghcr.io/open-telemetry/demo:2.2.0-frontend-proxy
    container_name: frontend-proxy
    depends_on:
      chatbot:
        condition: service_started
        required: true
      flagd-ui:
        condition: service_healthy
        required: true
      frontend:
        condition: service_healthy
        required: true
      grafana:
        condition: service_started
        required: true
      jaeger:
        condition: service_started
        required: true
      load-generator:
        condition: service_started
        required: true
      opamp-server:
        condition: service_healthy
        required: true
      telemetry-docs:
        condition: service_healthy
        required: true
    deploy:
      resources:
        limits:
          memory: "94371840"
    dns_search:
      - ""
    environment:
      CHATBOT_HOST: chatbot
      CHATBOT_PORT: "7860"
      ENVOY_ADDR: 0.0.0.0
      ENVOY_ADMIN_PORT: "10000"
      ENVOY_PORT: "8080"
      FIREPIT_HOST: firepit
      FIREPIT_PORT: "8080"
      FLAGD_HOST: flagd
      FLAGD_PORT: "8013"
      FLAGD_UI_HOST: flagd-ui
      FLAGD_UI_PORT: "4000"
      FRONTEND_HOST: frontend
      FRONTEND_PORT: "8080"
      GRAFANA_HOST: grafana
      GRAFANA_PORT: "3000"
      IMAGE_PROVIDER_HOST: image-provider
      IMAGE_PROVIDER_PORT: "8081"
      JAEGER_HOST: jaeger
      JAEGER_UI_PORT: "16686"
      LOCUST_WEB_HOST: load-generator
      LOCUST_WEB_PORT: "8089"
      OPAMP_ENDPOINT: opamp-server
      OPAMP_HOST: opamp-server
      OPAMP_PORT: "4320"
      OPAMP_SERVER_ENDPOINT: opamp-server
      OPAMP_SERVER_HOST: opamp-server
      OPAMP_SERVER_PORT: "4320"
      OPAMP_SERVER_UI_PORT: "4321"
      OTEL_COLLECTOR_HOST: otel-collector
      OTEL_COLLECTOR_PORT_GRPC: "4317"
      OTEL_COLLECTOR_PORT_HTTP: "4318"
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=opentelemetry-demo,service.version=2.2.0,service.criticality=critical
      OTEL_SERVICE_NAME: frontend-proxy
      OTEL_SERVICE_NAMESPACE: opentelemetry-demo
      TELEMETRY_DOCS_HOST: telemetry-docs
      TELEMETRY_DOCS_PORT: "8000"
    healthcheck:
      test:
        - CMD
        - bash
        - -c
        - echo > /dev/tcp/localhost/8080
      timeout: 5s
      interval: 5s
      retries: 20
      start_period: 10s
    image: ghcr.io/open-telemetry/demo:latest-frontend-proxy
    networks:
      default: null
    ports:
      - mode: ingress
        target: 8080
        published: "8080"
        protocol: tcp
      - mode: ingress
        target: 10000
        published: "10000"
        protocol: tcp
    restart: unless-stopped
  grafana:
    container_name: grafana
    deploy:
      resources:
        limits:
          memory: "314572800"
    environment:
      GF_INSTALL_PLUGINS: grafana-opensearch-datasource
      GF_SERVER_ROOT_URL: http://10.1.39.68:8080/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    image: grafana/grafana:13.0.1
    logging:
      driver: json-file
      options:
        max-file: "2"
        max-size: 5m
    networks:
      default: null
    ports:
      - mode: ingress
        target: 3000
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: bind
        source: /home/gaiadmin/opentelemetry-demo/src/grafana/grafana.ini
        target: /etc/grafana/grafana.ini
        bind: {}
      - type: bind
        source: /home/gaiadmin/opentelemetry-demo/src/grafana/provisioning
        target: /etc/grafana/provisioning
        bind: {}
  image-provider:
    build:
      context: /home/gaiadmin/opentelemetry-demo
      dockerfile: ./src/image-provider/Dockerfile
      cache_from:
        - ghcr.io/open-telemetry/demo:2.2.0-image-provider
    container_name: image-provider
    depends_on:
      otel-collector:
        condition: service_started
        required: true
    deploy:
      resources:
        limits:
          memory: "125829120"
    environment:
      IMAGE_PROVIDER_PORT: "8081"
      OTEL_COLLECTOR_HOST: otel-collector
      OTEL_COLLECTOR_PORT_GRPC: "4317"
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=opentelemetry-demo,service.version=2.2.0,service.criticality=low
      OTEL_SERVICE_NAME: image-provider
    healthcheck:
      test:
        - CMD
        - wget
        - --quiet
        - --tries=1
        - --spider
        - http://localhost:8081/status
      timeout: 5s
      interval: 5s
      retries: 20
      start_period: 10s
    image: ghcr.io/open-telemetry/demo:latest-image-provider
    logging:
      driver: json-file
      options:
        max-file: "2"
        max-size: 5m
    networks:
      default: null
    ports:
      - mode: ingress
        target: 8081
